name: Deploy to GCE prod

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to GCE prod via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_GCE_HOST }}
          username: ${{ secrets.PROD_GCE_USER }}
          key: ${{ secrets.PROD_GCE_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /var/www/koinvote
            git fetch origin
            git checkout main
            git pull origin main
            npm ci
            npm run build
            rm -f dist/mockServiceWorker.js

      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        if: always() # 確保無論成功或失敗都會跑這步
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🚀 **部署通知**
            專案: ${{ github.repository }} PROD
            狀態: ${{ job.status == 'success' && '✅ 成功' || '❌ 失敗' }}
            提交訊息: ${{ github.event.head_commit.message }}
            執行者: ${{ github.actor }}

            查看詳情: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
